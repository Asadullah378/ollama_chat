<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Starting Ollama Studio</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
      color: #e2e8f0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
      overflow: hidden;
      border-radius: 12px;
      -webkit-app-region: drag; /* Allows moving the frameless window */
      border: 1px solid rgba(255, 255, 255, 0.1);
    }
    .spinner {
      width: 40px;
      height: 40px;
      border: 3px solid rgba(6, 182, 212, 0.2); /* cyan-500/20 */
      border-radius: 50%;
      border-top-color: #06b6d4; /* cyan-500 */
      animation: spin 1s ease-in-out infinite;
      margin-bottom: 20px;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    h1 {
      font-size: 24px;
      margin: 0 0 10px 0;
      font-weight: 600;
      background: linear-gradient(to right, #22d3ee, #a78bfa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    p {
      font-size: 14px;
      color: #94a3b8;
      margin: 0;
      text-align: center;
      padding: 0 20px;
    }
  </style>
</head>
<body>
  <div class="spinner"></div>
  <h1>Ollama Studio</h1>
  <p id="status">Initializing Docker environment...</p>
</body>
</html>
